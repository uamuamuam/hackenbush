<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hackenbush</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f4f4f4;overflow:hidden;-webkit-user-select:none;height:100vh;display:flex;flex-direction:column}
#toolbar{background:white;display:flex;flex-wrap:wrap;gap:6px;padding:8px;border-bottom:1px solid #ddd;flex-shrink:0}
button,select,input[type=number]{padding:6px 10px;font-size:14px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer}
button.active{background:#222;color:#fff;border-color:#222}
#status{font-size:13px;padding:6px 10px;color:#333;flex:1;min-width:160px;display:flex;align-items:center}
canvas{flex:1;width:100%;touch-action:none;background:#fafafa}
#endgamePanel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border:2px solid #222;border-radius:12px;padding:24px;z-index:20;text-align:center;box-shadow:0 0 20px rgba(0,0,0,.3);min-width:220px}
#endgameMessage{margin-bottom:16px;font-weight:bold;font-size:20px}
.ep-btn{margin:5px;padding:8px 16px;font-size:14px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer}
</style>
</head>
<body>
<div id="toolbar">
  <button id="modeDraw" class="active">✏️ Disegno</button>
  <button id="modeMove">🧲 Sposta nodi</button>
  <button id="modePlay">🎮 Gioco</button>

  <select id="colorSelect">
    <option value="red">Rosso</option>
    <option value="blue">Blu</option>
    <option value="green">Verde</option>
  </select>

  <label style="font-size:13px;display:flex;align-items:center;gap:4px">
    Griglia<input type="number" id="gridSize" value="20" min="5" max="100" style="width:50px">
  </label>

  <select id="opponentSelect">
    <option value="human">vs Umano</option>
    <option value="random">vs CPU Casuale</option>
    <option value="mcts">vs CPU MCTS</option>
    <option value="sg">vs CPU Sprague-Grundy (solo verde)</option>
  </select>

  <button id="undoBtn">↩️ Undo</button>
  <button id="clearBtn">🗑️ Reset</button>
  <button id="saveBtn">💾 Save</button>
  <button id="loadBtn">📂 Load</button>
  <input type="file" id="fileInput" style="display:none">
  <div id="status"></div>
</div>

<canvas id="canvas"></canvas>

<div id="endgamePanel">
  <div id="endgameMessage"></div>
  <button class="ep-btn" id="replayBtn">🎮 Rigioca</button>
  <button class="ep-btn" id="saveMapBtn">💾 Salva mappa</button>
  <button class="ep-btn" id="newMapBtn">🗑️ Nuova partita</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let mode = "draw";
let currentColor = "red";
let currentPlayer = "red";
let segments = [], history = [], nextId = 1;
let drawing = false, startPoint = null, currentPoint = null;
let gridSize = 20;
let cpuThinking = false;
let opponent = "human";
let savedMap = null;

// Move nodes mode
let moveNodes = false;
let draggingNodeKey = null;

document.getElementById("opponentSelect").onchange = e => { opponent = e.target.value; };

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  drawAll();
}
window.addEventListener("resize", () => setTimeout(resize, 50));
window.addEventListener("load", () => setTimeout(resize, 100));

document.getElementById("modeDraw").onclick = () => setMode("draw");
document.getElementById("modePlay").onclick  = () => setMode("play");
document.getElementById("colorSelect").onchange = e => { currentColor = e.target.value; updateStatus(); };
document.getElementById("gridSize").onchange   = e => { gridSize = parseInt(e.target.value); };
document.getElementById("undoBtn").onclick  = undo;
document.getElementById("clearBtn").onclick = resetAll;
document.getElementById("saveBtn").onclick  = saveJSON;
document.getElementById("loadBtn").onclick  = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").addEventListener("change", loadJSON);

document.getElementById("modeMove").onclick = () => {
  moveNodes = !moveNodes;
  document.getElementById("modeMove").classList.toggle("active", moveNodes);
  updateStatus();
};

function setMode(m) {
  mode = m;
  document.getElementById("modeDraw").classList.toggle("active", mode === "draw");
  document.getElementById("modePlay").classList.toggle("active", mode === "play");

  if (mode === "play") {
    savedMap = JSON.parse(JSON.stringify(segments));
    currentPlayer = "red";
    cpuThinking = false;
    moveNodes = false;
    document.getElementById("modeMove").classList.remove("active");
  }

  updateStatus();
  drawAll();
}

function updateStatus(msg) {
  const s = document.getElementById("status");
  if (mode === "draw") {
    s.innerHTML = `Disegno | Colore: <b style="color:${currentColor}">${currentColor}</b>`
                + (moveNodes ? " | <b>Sposta nodi ON</b>" : "");
  } else {
    s.innerHTML = `Turno: <b style="color:${currentPlayer}">${currentPlayer}</b>`;
  }
  if (msg) s.innerHTML += ` &nbsp;<span style="color:#c00">${msg}</span>`;
}

function groundY() { return canvas.height - 30; }
function groundY_int() { return Math.round(groundY()); }

function snapPoint(x, y) {
  x = Math.round(x / gridSize) * gridSize;
  y = Math.round(y / gridSize) * gridSize;

  for (const s of segments) {
    if (Math.hypot(x - s.x1, y - s.y1) < 18) return { x: s.x1, y: s.y1 };
    if (Math.hypot(x - s.x2, y - s.y2) < 18) return { x: s.x2, y: s.y2 };
  }
  if (Math.abs(y - groundY()) < 18) return { x, y: groundY() };
  return { x, y };
}

function getPointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function distPointToSegment(px, py, x1, y1, x2, y2) {
  const C = x2-x1, D = y2-y1, lenSq = C*C+D*D;
  let param = lenSq !== 0 ? ((px-x1)*C + (py-y1)*D) / lenSq : -1;
  let xx, yy;
  if (param < 0)      { xx = x1; yy = y1; }
  else if (param > 1) { xx = x2; yy = y2; }
  else                { xx = x1+param*C; yy = y1+param*D; }
  return Math.sqrt((px-xx)**2 + (py-yy)**2);
}

function findSegmentNear(x, y, threshold = 15) {
  let best = null, bestDist = threshold;
  for (const s of segments) {
    const d = distPointToSegment(x, y, s.x1, s.y1, s.x2, s.y2);
    if (d < bestDist) { bestDist = d; best = s; }
  }
  return best;
}

// ---- Disegno ----

function drawGround() {
  ctx.strokeStyle = "#000"; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, groundY()); ctx.lineTo(canvas.width, groundY()); ctx.stroke();
  ctx.strokeStyle = "#888"; ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 20) {
    ctx.beginPath(); ctx.moveTo(x, groundY()); ctx.lineTo(x-10, groundY()+12); ctx.stroke();
  }
}

function drawSegments(highlightId = null) {
  for (const s of segments) {
    ctx.strokeStyle = s.color; ctx.lineWidth = 6; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
  }
  if (highlightId != null) {
    const s = segments.find(x => x.id === highlightId);
    if (s) {
      ctx.strokeStyle = "gold"; ctx.lineWidth = 10;
      ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
    }
  }
}

function getJunctionNodes() {
  const count = new Map(), pos = new Map();
  function key(x, y) { return `${Math.round(x)}:${Math.round(y)}`; }
  for (const s of segments) {
    const k1 = key(s.x1,s.y1), k2 = key(s.x2,s.y2);
    count.set(k1, (count.get(k1)||0) + 1);
    count.set(k2, (count.get(k2)||0) + 1);
    pos.set(k1, {x:s.x1, y:s.y1});
    pos.set(k2, {x:s.x2, y:s.y2});
  }
  const result = [];
  for (const [k, p] of pos) {
    if ((count.get(k)||0) >= 2 || Math.abs(p.y - groundY()) < 2) result.push(p);
  }
  return result;
}

function drawNodes() {
  for (const n of getJunctionNodes()) {
    ctx.beginPath(); ctx.arc(n.x, n.y, 5, 0, Math.PI*2);
    ctx.fillStyle = "white"; ctx.fill();
    ctx.strokeStyle = "#333"; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

function drawAll(highlightId = null) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGround(); drawSegments(highlightId); drawNodes();
}

// ---- Move Nodes helpers ----

function allNodePositions() {
  const nodes = [];
  for (const s of segments) {
    nodes.push({x:s.x1, y:s.y1});
    nodes.push({x:s.x2, y:s.y2});
  }
  return nodes;
}

function findNodeNear(x, y, threshold = 18) {
  let best = null;
  let bestDist = threshold;

  for (const p of allNodePositions()) {
    const d = Math.hypot(x - p.x, y - p.y);
    if (d < bestDist) {
      bestDist = d;
      best = p;
    }
  }

  if (!best) return null;
  return {x: best.x, y: best.y};
}

function moveNode(oldX, oldY, newX, newY) {
  for (const s of segments) {
    if (Math.abs(s.x1 - oldX) < 1 && Math.abs(s.y1 - oldY) < 1) {
      s.x1 = newX; s.y1 = newY;
    }
    if (Math.abs(s.x2 - oldX) < 1 && Math.abs(s.y2 - oldY) < 1) {
      s.x2 = newX; s.y2 = newY;
    }
  }
}

// ---- Input ----

canvas.addEventListener("pointerdown", e => {
  if (cpuThinking) return;
  const pos = getPointerPos(e);

  // drag node
  if (mode === "draw" && moveNodes) {
    const node = findNodeNear(pos.x, pos.y, 20);
    if (node) {
      saveHistory();
      draggingNodeKey = nodeKey(node.x, node.y);
      startPoint = node;
      drawing = true;
      return;
    }
  }

  if (mode === "draw") {
    drawing = true;
    startPoint = currentPoint = snapPoint(pos.x, pos.y);
  }
});

canvas.addEventListener("pointermove", e => {
  if (!drawing) return;
  const pos = getPointerPos(e);

  // dragging node
  if (mode === "draw" && moveNodes && draggingNodeKey && startPoint) {
    const snapped = snapPoint(pos.x, pos.y);

    const newX = Math.round(snapped.x / gridSize) * gridSize;
    const newY = Math.round(snapped.y / gridSize) * gridSize;

    moveNode(startPoint.x, startPoint.y, newX, newY);
    startPoint = {x:newX, y:newY};

    drawAll();
    return;
  }

  // normal drawing
  currentPoint = snapPoint(pos.x, pos.y);
  drawAll();
  ctx.strokeStyle = currentColor; ctx.lineWidth = 4; ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(startPoint.x, startPoint.y); ctx.lineTo(currentPoint.x, currentPoint.y); ctx.stroke();
  ctx.setLineDash([]);
});

canvas.addEventListener("pointerup", e => {
  if (cpuThinking) return;
  const pos = getPointerPos(e);

  // play mode cut
  if (!drawing && mode === "play") {
    const s = findSegmentNear(pos.x, pos.y, 18);
    if (s) {
      if (canCut(s, currentPlayer)) playerMove(s.id);
      else updateStatus("Non puoi tagliare questo colore!");
    }
    return;
  }

  if (!drawing) return;

  // finish dragging node
  if (mode === "draw" && moveNodes && draggingNodeKey) {
    drawing = false;
    draggingNodeKey = null;
    startPoint = null;
    drawAll();
    return;
  }

  // finish drawing segment
  drawing = false;
  if (!startPoint || !currentPoint) return;
  if (Math.hypot(currentPoint.x-startPoint.x, currentPoint.y-startPoint.y) < 10) {
    drawAll();
    return;
  }

  saveHistory();
  segments.push({
    id: nextId++,
    x1: startPoint.x, y1: startPoint.y,
    x2: currentPoint.x, y2: currentPoint.y,
    color: currentColor
  });

  startPoint = currentPoint = null;
  drawAll();
});

// ---- Regole ----

function canCut(seg, player) { return seg.color === "green" || seg.color === player; }
function movesAvailable(player) { return segments.some(s => canCut(s, player)); }

// ---- Turni ----

function playerMove(id) {
  saveHistory();
  fadeOutSegment(segments.find(s => s.id === id), () => {
    switchTurn();
    scheduleCpuMove();
  });
}

function switchTurn() {
  currentPlayer = (currentPlayer === "red") ? "blue" : "red";
  drawAll(); updateStatus(); checkWin();
}

function checkWin() {
  if (!movesAvailable(currentPlayer)) {
    const winner = (currentPlayer === "red") ? "blue" : "red";
    canvas.style.pointerEvents = "none";
    cpuThinking = false;
    document.getElementById("endgamePanel").style.display = "block";
    document.getElementById("endgameMessage").textContent = `🏆 Ha vinto ${winner}!`;
  }
}

// ---- CPU ----

function scheduleCpuMove() {
  if (mode !== "play" || opponent === "human" || currentPlayer !== "blue") return;
  if (!movesAvailable("blue")) return;
  cpuThinking = true;
  updateStatus("CPU pensa...");

  setTimeout(() => {
    let chosen = null;
    try {
      chosen = (opponent === "mcts") ? mctsBestMove(900) :
               (opponent === "sg")   ? sgBestMove() :
                                       randomMove();
    } catch(e) { console.warn("CPU error:", e); }

    if (!chosen) chosen = randomMove();

    cpuThinking = false;
    if (chosen) fadeOutSegment(chosen, () => { switchTurn(); });
    else switchTurn();
  }, 60);
}

function randomMove() {
  const movable = segments.filter(s => canCut(s, "blue"));
  return movable.length ? movable[Math.floor(Math.random() * movable.length)] : null;
}

// ======================
// FAST MCTS CPU (Partizan)
// ======================

function buildCompactPosition(segs) {
  const nodeMap = new Map();
  const nodes = [];
  const edges = [];

  const gy = groundY_int();

  function getNodeId(x, y) {
    const k = `${Math.round(x)}:${Math.round(y)}`;
    if (nodeMap.has(k)) return nodeMap.get(k);
    const id = nodes.length;
    nodeMap.set(k, id);
    nodes.push({x, y, isGround: Math.abs(Math.round(y) - gy) < 2});
    return id;
  }

  for (const s of segs) {
    const a = getNodeId(s.x1, s.y1);
    const b = getNodeId(s.x2, s.y2);
    edges.push({a, b, color: s.color, id: s.id});
  }

  const adj = Array.from({length: nodes.length}, () => []);
  for (let ei = 0; ei < edges.length; ei++) {
    const e = edges[ei];
    adj[e.a].push(ei);
    adj[e.b].push(ei);
  }

  const groundNodes = [];
  for (let i = 0; i < nodes.length; i++) if (nodes[i].isGround) groundNodes.push(i);

  return {nodes, edges, adj, groundNodes};
}

function reachableNodesFromGround(pos, aliveEdges) {
  const {adj, edges, groundNodes, nodes} = pos;
  const reachable = new Uint8Array(nodes.length);

  const queue = new Int32Array(nodes.length);
  let qh = 0, qt = 0;

  for (const g of groundNodes) {
    reachable[g] = 1;
    queue[qt++] = g;
  }

  while (qh < qt) {
    const n = queue[qh++];

    for (const ei of adj[n]) {
      if (!aliveEdges[ei]) continue;
      const e = edges[ei];
      const to = (e.a === n) ? e.b : e.a;
      if (!reachable[to]) {
        reachable[to] = 1;
        queue[qt++] = to;
      }
    }
  }

  return reachable;
}

function pruneDisconnectedEdges(pos, aliveEdges) {
  const reachable = reachableNodesFromGround(pos, aliveEdges);
  const {edges} = pos;

  for (let ei = 0; ei < edges.length; ei++) {
    if (!aliveEdges[ei]) continue;
    const e = edges[ei];
    if (!reachable[e.a] || !reachable[e.b]) aliveEdges[ei] = 0;
  }
}

function legalMovesIndices(pos, aliveEdges, player) {
  const {edges} = pos;
  const moves = [];

  for (let ei = 0; ei < edges.length; ei++) {
    if (!aliveEdges[ei]) continue;
    const c = edges[ei].color;
    if (c === "green" || c === player) moves.push(ei);
  }

  return moves;
}

function applyMoveFast(pos, aliveEdges, moveEi) {
  aliveEdges[moveEi] = 0;
  pruneDisconnectedEdges(pos, aliveEdges);
}

function rolloutPickMoveFast(pos, aliveEdges, player) {
  const moves = legalMovesIndices(pos, aliveEdges, player);
  if (!moves.length) return -1;

  const sampleCount = Math.min(6, moves.length);
  let bestEi = moves[Math.floor(Math.random() * moves.length)];
  let bestScore = -Infinity;

  let aliveCount = 0;
  for (let i = 0; i < aliveEdges.length; i++) if (aliveEdges[i]) aliveCount++;

  for (let i = 0; i < sampleCount; i++) {
    const ei = moves[Math.floor(Math.random() * moves.length)];
    const tmp = new Uint8Array(aliveEdges);

    applyMoveFast(pos, tmp, ei);

    let afterCount = 0;
    for (let k = 0; k < tmp.length; k++) if (tmp[k]) afterCount++;

    const dropped = aliveCount - afterCount;
    const score = dropped + Math.random() * 0.2;

    if (score > bestScore) {
      bestScore = score;
      bestEi = ei;
    }
  }

  return bestEi;
}

function terminalWinnerFast(pos, aliveEdges, playerToMove) {
  const moves = legalMovesIndices(pos, aliveEdges, playerToMove);
  if (moves.length === 0) return (playerToMove === "red") ? "blue" : "red";
  return null;
}

function simulatePlayoutFast(pos, aliveEdgesStart, startPlayer) {
  let aliveEdges = new Uint8Array(aliveEdgesStart);
  let player = startPlayer;

  for (let step = 0; step < 200; step++) {
    const win = terminalWinnerFast(pos, aliveEdges, player);
    if (win) return win;

    const moveEi = rolloutPickMoveFast(pos, aliveEdges, player);
    if (moveEi < 0) return (player === "red") ? "blue" : "red";

    applyMoveFast(pos, aliveEdges, moveEi);
    player = (player === "red") ? "blue" : "red";
  }

  return "red";
}

function mctsBestMove(simulations = 600) {
  const pos = buildCompactPosition(segments);
  if (!pos.groundNodes.length) return randomMove();

  const alive0 = new Uint8Array(pos.edges.length);
  alive0.fill(1);

  pruneDisconnectedEdges(pos, alive0);

  const rootMoves = legalMovesIndices(pos, alive0, "blue");
  if (!rootMoves.length) return null;

  const wins = new Float32Array(pos.edges.length);
  const plays = new Uint32Array(pos.edges.length);

  for (let i = 0; i < simulations; i++) {
    let chosenEi = rootMoves[0];
    let bestUcb = -Infinity;
    const total = i + 1;

    for (const ei of rootMoves) {
      const n = plays[ei];
      if (n === 0) { chosenEi = ei; bestUcb = Infinity; break; }

      const wr = wins[ei] / n;
      const ucb = wr + Math.sqrt(2 * Math.log(total) / n);

      if (ucb > bestUcb) {
        bestUcb = ucb;
        chosenEi = ei;
      }
    }

    const alive = new Uint8Array(alive0);
    applyMoveFast(pos, alive, chosenEi);

    const winner = simulatePlayoutFast(pos, alive, "red");

    plays[chosenEi]++;
    if (winner === "blue") wins[chosenEi] += 1;
  }

  let bestEi = rootMoves[0];
  let bestRate = -1;

  for (const ei of rootMoves) {
    const n = plays[ei];
    const rate = n ? (wins[ei] / n) : 0;
    if (rate > bestRate) {
      bestRate = rate;
      bestEi = ei;
    }
  }

  const chosenId = pos.edges[bestEi].id;
  return segments.find(s => s.id === chosenId) || randomMove();
}

// ---- Sprague-Grundy (ATTENZIONE: valido solo verde) ----

function nodeKey(x, y) { return `${Math.round(x)}:${Math.round(y)}`; }

function buildAdj(segs) {
  const adj = new Map();
  for (const s of segs) {
    const a = nodeKey(s.x1,s.y1), b = nodeKey(s.x2,s.y2);
    if (!adj.has(a)) adj.set(a, []);
    if (!adj.has(b)) adj.set(b, []);
    adj.get(a).push({to:b, id:s.id});
    adj.get(b).push({to:a, id:s.id});
  }
  return adj;
}

function getGroundSet(segs) {
  const gy = groundY_int(), g = new Set();
  for (const s of segs) {
    if (Math.abs(Math.round(s.y1)-gy) < 2) g.add(nodeKey(s.x1,s.y1));
    if (Math.abs(Math.round(s.y2)-gy) < 2) g.add(nodeKey(s.x2,s.y2));
  }
  return g;
}

function reachableFrom(groundSet, adj) {
  const visited = new Set([...groundSet]);
  const queue = [...groundSet];
  let qi = 0;

  while (qi < queue.length) {
    const n = queue[qi++];
    for (const {to} of (adj.get(n)||[])) {
      if (!visited.has(to)) {
        visited.add(to);
        queue.push(to);
      }
    }
  }
  return visited;
}

function computeNimValue(segs) {
  if (!segs.length) return 0;
  const adj = buildAdj(segs);
  const groundSet = getGroundSet(segs);
  if (!groundSet.size) return 0;
  const reachable = reachableFrom(groundSet, adj);

  const visited = new Set();
  const parent = new Map();
  const parentEdgeId = new Map();
  const childrenOf = new Map();
  let backEdgeCount = 0;

  const stack = [];
  for (const g of groundSet) {
    if (reachable.has(g) && !visited.has(g)) {
      visited.add(g);
      childrenOf.set(g, []);
      parent.set(g, null);
      parentEdgeId.set(g, -1);
      for (const {to, id} of (adj.get(g)||[])) {
        if (reachable.has(to)) stack.push({node: to, par: g, eid: id});
      }
    }
  }

  while (stack.length) {
    const {node, par, eid} = stack.pop();
    if (visited.has(node)) {
      backEdgeCount++;
      continue;
    }
    visited.add(node);
    parent.set(node, par);
    parentEdgeId.set(node, eid);
    if (!childrenOf.has(par)) childrenOf.set(par, []);
    childrenOf.get(par).push(node);
    childrenOf.set(node, []);
    for (const {to, id} of (adj.get(node)||[])) {
      if (!reachable.has(to)) continue;
      if (id === eid) continue;
      stack.push({node: to, par: node, eid: id});
    }
  }

  const cycles = Math.floor(backEdgeCount / 2);

  const bfsOrder = [];
  const bfsQ = [...groundSet].filter(g => visited.has(g));
  let bi = 0;

  const bfsSeen = new Set(bfsQ);
  bfsOrder.push(...bfsQ);

  while (bi < bfsQ.length) {
    const n = bfsQ[bi++];
    for (const c of (childrenOf.get(n)||[])) {
      if (!bfsSeen.has(c)) {
        bfsSeen.add(c);
        bfsQ.push(c);
        bfsOrder.push(c);
      }
    }
  }

  const grundy = new Map();
  for (let i = bfsOrder.length - 1; i >= 0; i--) {
    const n = bfsOrder[i];
    let xor = 0;
    for (const c of (childrenOf.get(n)||[])) {
      xor ^= ((grundy.get(c) || 0) + 1);
    }
    grundy.set(n, xor);
  }

  let nim = 0;
  for (const g of groundSet) {
    if (visited.has(g)) nim ^= (grundy.get(g) || 0);
  }
  nim ^= (cycles & 1);
  return nim;
}

function simulateRemove(segs, removeId) {
  const after = segs.filter(s => s.id !== removeId);
  const adj = buildAdj(after);
  const groundSet = getGroundSet(after);
  const reachable = reachableFrom(groundSet, adj);
  return after.filter(s =>
    reachable.has(nodeKey(s.x1,s.y1)) && reachable.has(nodeKey(s.x2,s.y2))
  );
}

function sgBestMove() {
  const movable = segments.filter(s => canCut(s, "blue"));
  if (!movable.length) return null;
  for (const s of movable) {
    if (computeNimValue(simulateRemove(segments, s.id)) === 0) return s;
  }
  return movable[Math.floor(Math.random() * movable.length)];
}

// ---- Connettività ----

function removeDisconnected() {
  const adj = buildAdj(segments);
  const groundSet = getGroundSet(segments);
  const reachable = reachableFrom(groundSet, adj);
  segments = segments.filter(s =>
    reachable.has(nodeKey(s.x1,s.y1)) && reachable.has(nodeKey(s.x2,s.y2))
  );
}

function cutSegment(id) {
  segments = segments.filter(s => s.id !== id);
  removeDisconnected();
  drawAll();
}

function fadeOutSegment(seg, callback) {
  if (!seg) { if (callback) callback(); return; }
  let alpha = 1;
  const step = () => {
    alpha -= 0.1;
    if (alpha <= 0) {
      cutSegment(seg.id);
      if (callback) callback();
    } else {
      drawAll(seg.id);
      ctx.globalAlpha = alpha; ctx.strokeStyle = seg.color; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(seg.x1,seg.y1); ctx.lineTo(seg.x2,seg.y2); ctx.stroke();
      ctx.globalAlpha = 1;
      requestAnimationFrame(step);
    }
  };
  step();
}

// ---- Undo / Reset / Save / Load ----

function saveHistory() { history.push(JSON.stringify(segments)); if (history.length > 50) history.shift(); }

function undo() {
  if (!history.length) return;
  segments = JSON.parse(history.pop());
  drawAll();
}

function resetAll() {
  segments = []; history = []; nextId = 1; cpuThinking = false; savedMap = null;
  drawing = false; startPoint = null; currentPoint = null;
  draggingNodeKey = null;
  moveNodes = false;
  document.getElementById("modeMove").classList.remove("active");

  document.getElementById("endgamePanel").style.display = "none";
  canvas.style.pointerEvents = "auto";
  mode = "draw"; currentPlayer = "red";
  document.getElementById("modeDraw").classList.add("active");
  document.getElementById("modePlay").classList.remove("active");
  updateStatus(); drawAll();
}

function saveJSON() {
  const blob = new Blob([JSON.stringify(segments, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "hackenbush.json"; a.click();
  URL.revokeObjectURL(url);
}

function loadJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      segments = JSON.parse(ev.target.result);
      nextId = segments.length > 0 ? Math.max(...segments.map(s=>s.id))+1 : 1;
      drawAll();
    } catch { updateStatus("JSON non valido"); }
  };
  reader.readAsText(file);
}

// ---- Endgame ----

document.getElementById("replayBtn").onclick = () => {
  document.getElementById("endgamePanel").style.display = "none";
  canvas.style.pointerEvents = "auto";
  cpuThinking = false; currentPlayer = "red"; history = [];

  if (savedMap !== null) {
    segments = JSON.parse(JSON.stringify(savedMap));
    nextId = segments.length > 0 ? Math.max(...segments.map(s=>s.id))+1 : 1;
  }

  drawAll(); updateStatus();
};

document.getElementById("saveMapBtn").onclick = saveJSON;
document.getElementById("newMapBtn").onclick = () => {
  document.getElementById("endgamePanel").style.display = "none";
  resetAll();
};

updateStatus();
</script>
